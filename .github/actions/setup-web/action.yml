name: 'Setup Web Environment'
description: 'Download WASM + bindings artifacts and install web dependencies'

runs:
  using: 'composite'
  steps:
    - uses: oven-sh/setup-bun@v2

    - name: Download WASM artifact
      uses: actions/download-artifact@v4
      with:
        name: wasm-package
        path: apps/web/src/lib/wasm/

    - name: Download bindings artifact
      uses: actions/download-artifact@v4
      with:
        name: ts-bindings
        path: crates/diaryx_core/bindings/

    - name: Install dependencies
      shell: bash
      run: cd apps/web && bun install
