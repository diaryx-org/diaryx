name: App Store Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Which platforms to publish"
        required: true
        type: choice
        default: both
        options:
          - ios
          - macos
          - both
      build_number:
        description: "CFBundleVersion for macOS (must increase monotonically). Defaults to github.run_number."
        required: false
        type: string

concurrency:
  group: appstore-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish (${{ matrix.platform }})
    runs-on: macos-latest
    environment: appstore
    strategy:
      fail-fast: false
      matrix:
        # On tag pushes inputs.platforms is empty -> default to both.
        platform: ${{ (inputs.platforms == 'ios' && fromJSON('["ios"]')) || (inputs.platforms == 'macos' && fromJSON('["macos"]')) || fromJSON('["ios","macos"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ios' && 'aarch64-apple-ios' || 'aarch64-apple-darwin,x86_64-apple-darwin' }}

      # iOS only: the editor-toolbar plugin uses iOS 26 symbols (UIGlassEffect)
      # behind `#available(iOS 26, *)`. Those symbols must exist at compile
      # time, so build against the iOS 26 SDK — macos-latest defaults to an
      # older Xcode (16.x / iOS 18 SDK). The runtime guard keeps older devices
      # on the UIBlurEffect fallback.
      - name: Select Xcode
        if: matrix.platform == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # iOS only: `cargo xtask publish-ios` drives the build with `cargo tauri`
      # so the generated Xcode "Build Rust Code" phase re-invokes the CLI as
      # `cargo tauri ios xcode-script` (cwd-independent). The npm-pinned
      # `.bin/tauri` would bake an unresolvable `node tauri` instead. Pin to the
      # same version as @tauri-apps/cli in apps/web/package.json.
      - name: Set up cargo-binstall
        if: matrix.platform == 'ios'
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        if: matrix.platform == 'ios'
        # Fetch the prebuilt cargo-tauri binary; never fall back to a source
        # build (compiling tauri-cli hits a tauri-utils/time E0119 error and is
        # slow). GITHUB_TOKEN lets binstall reach the GitHub release API.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo binstall -y --disable-strategies compile tauri-cli@2.10.1

      # Required by diaryx_core -> fig, whose build.rs shells out to `zig build`.
      - name: Install Zig
        uses: ./.github/actions/setup-zig

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        run: cd apps/web && bun install

      - name: Create WASM stub for Tauri build
        run: |
          mkdir -p apps/web/src/lib/wasm
          cp apps/web/src/lib/wasm-stub.js apps/web/src/lib/wasm/diaryx_wasm.js
          touch apps/web/src/lib/wasm/diaryx_wasm_bg.wasm

      - name: Write App Store Connect API key
        id: asc-key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEY_DIR="$RUNNER_TEMP/app-store-connect"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -d > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          # altool discovers the key automatically when placed here.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEY_PATH" "$HOME/.appstoreconnect/private_keys/"
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Import signing certificates
        env:
          # App Store uses the "Apple Distribution" cert, NOT the "Developer ID"
          # cert in APPLE_CERTIFICATE (that one is for tauri-release notarization).
          # The Apple Distribution cert signs both iOS and macOS App Store apps.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/appstore.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          APP_CERT="$RUNNER_TEMP/app.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 -d > "$APP_CERT"
          security import "$APP_CERT" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # The installer cert produces the macOS .pkg only; iOS doesn't need it.
          if [ "$PLATFORM" = "macos" ]; then
            INSTALLER_CERT="$RUNNER_TEMP/installer.p12"
            printf '%s' "$MACOS_INSTALLER_CERTIFICATE" | base64 -d > "$INSTALLER_CERT"
            security import "$INSTALLER_CERT" -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

      - name: Install macOS provisioning profile
        if: matrix.platform == 'macos'
        env:
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 -d \
            > apps/tauri/src-tauri/embedded.provisionprofile

      - name: Publish iOS
        if: matrix.platform == 'ios'
        env:
          API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          API_KEY_PATH: ${{ steps.asc-key.outputs.key_path }}
          # Drives automatic provisioning: xcodebuild uses the team + the API key
          # (written above) to fetch/create the iOS App Store profile at build time.
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo xtask publish-ios

      - name: Publish macOS
        if: matrix.platform == 'macos'
        env:
          API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
          PKG_SIGN_IDENTITY: ${{ secrets.PKG_SIGN_IDENTITY }}
        run: cargo xtask publish-macos "${{ inputs.build_number || github.run_number }}"
