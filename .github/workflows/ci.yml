name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust library tests
  test:
    name: Test Rust
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build library
        run: cargo build -p diaryx_core --verbose

      - name: Build CLI
        run: cargo build -p diaryx --verbose

      - name: Run tests
        run: cargo test -p diaryx --verbose

  # Rust formatting check
  fmt:
    name: Formatting
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Rust linting
  clippy:
    name: Clippy
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy -p diaryx_core -- -D warnings

  # Build WASM once with caching, shared by all web jobs
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache WASM build
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: apps/web/src/lib/wasm/
          key: wasm-${{ hashFiles('crates/diaryx_core/src/**', 'crates/diaryx_core/Cargo.toml', 'crates/diaryx_wasm/src/**', 'crates/diaryx_wasm/Cargo.toml', 'Cargo.lock') }}

      - name: Cache TypeScript bindings
        id: bindings-cache
        uses: actions/cache@v4
        with:
          path: crates/diaryx_core/bindings/
          key: ts-bindings-${{ hashFiles('crates/diaryx_core/src/**', 'crates/diaryx_core/Cargo.toml', 'Cargo.lock') }}

      - name: Install Nix
        if: steps.wasm-cache.outputs.cache-hit != 'true' || steps.bindings-cache.outputs.cache-hit != 'true'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        if: steps.wasm-cache.outputs.cache-hit != 'true' || steps.bindings-cache.outputs.cache-hit != 'true'
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build WASM
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          cd apps/web
          nix develop --command bash -c "bun install && ../../scripts/build-wasm.sh"

      - name: Generate TypeScript bindings
        if: steps.bindings-cache.outputs.cache-hit != 'true'
        run: nix develop --command cargo test -p diaryx_core

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: apps/web/src/lib/wasm/

      - name: Upload bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: crates/diaryx_core/bindings/

  # Discover internal Extism plugins dynamically from Cargo metadata.
  discover-plugins:
    name: Discover Plugins
    runs-on: ubuntu-latest
    needs: [changes]
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.plugins == 'true'
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover plugin crates
        id: discover
        run: |
          MATRIX_JSON="$(./scripts/plugins/discover-internal-plugins.sh)"
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "$MATRIX_JSON" | jq .

  # Build plugin WASM artifacts in parallel (one job per plugin crate).
  build-plugin:
    name: Build Plugin (${{ matrix.plugin.crate }})
    runs-on: ubuntu-latest
    needs: [changes, discover-plugins]
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.plugins == 'true'
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build plugin package
        run: |
          ./scripts/plugins/build-internal-plugin.sh \
            "${{ matrix.plugin.crate }}" \
            "${{ matrix.plugin.target }}" \
            plugin-package

      - name: Upload plugin package
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package-${{ matrix.plugin.crate }}
          path: plugin-package/

  # Assemble registry-v2.json from internal build metadata + curated catalogs.
  assemble-plugin-registry:
    name: Assemble Plugin Registry
    runs-on: ubuntu-latest
    needs: [changes, build-plugin]
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.plugins == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugin packages
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-package-*
          path: plugin-packages/
          merge-multiple: false

      - name: Assemble registry-v2
        run: |
          ./scripts/plugins/assemble-registry-v2.sh \
            plugin-packages \
            plugin-registry/registry-v2.json \
            plugins/catalog/internal-plugins.json \
            plugins/catalog/external-plugins.json \
            https://cdn.diaryx.org \
            plugin-registry/upload-plan.json
          jq . plugin-registry/registry-v2.json

      - name: Upload plugin registry artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-registry-v2
          path: plugin-registry/

  # Web app build and checks
  web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: apps/web/src/lib/wasm/

      - name: Download bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: crates/diaryx_core/bindings/

      - name: Install dependencies
        run: |
          cd apps/web
          nix develop --command bun install

      - name: Type check
        run: |
          cd apps/web
          nix develop --command bun run check

      - name: Build
        run: |
          cd apps/web
          nix develop --command bunx vite build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  # Upload core WASM bindings to CDN on push (not PRs).
  upload-wasm-cdn:
    name: Upload Core WASM to CDN
    runs-on: ubuntu-latest
    needs: [build-wasm, changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: wasm-output/

      - name: Upload WASM to CDN (SHA)
        uses: ./.github/actions/upload-wasm-cdn
        with:
          wasm-path: wasm-output
          version: sha-${{ github.sha }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-endpoint: ${{ secrets.R2_ENDPOINT }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

      - name: Upload WASM to CDN (branch)
        uses: ./.github/actions/upload-wasm-cdn
        with:
          wasm-path: wasm-output
          version: ${{ github.ref_name }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-endpoint: ${{ secrets.R2_ENDPOINT }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

  # Upload plugin artifacts + registry-v2 to CDN.
  upload-plugin-registry-cdn:
    name: Upload Plugin Registry to CDN
    runs-on: ubuntu-latest
    needs: [changes, build-plugin, assemble-plugin-registry]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.plugins == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugin packages
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-package-*
          path: plugin-packages/
          merge-multiple: false

      - name: Download plugin registry artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-registry-v2
          path: plugin-registry/

      - name: Upload plugin artifacts and registry-v2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          ./scripts/plugins/upload-plugin-artifacts.sh \
            plugin-packages \
            plugin-registry/upload-plan.json \
            plugin-registry/registry-v2.json \
            "${{ secrets.R2_ENDPOINT }}" \
            "${{ secrets.R2_BUCKET }}"

  # Publish WASM bindings to npm (JS glue + types, no .wasm binary)
  publish-wasm-npm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    needs: [build-wasm, changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    permissions:
      id-token: write
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: wasm-output/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Patch package.json for npm
        working-directory: wasm-output
        run: |
          # Read base version from wasm-pack output
          BASE_VERSION=$(jq -r '.version' package.json)
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Set scoped package name
          jq '.name = "@diaryx/wasm"' package.json > tmp.json && mv tmp.json package.json

          # Ship JS glue + types only (no .wasm binary — that loads from CDN)
          jq '.files = ["diaryx_wasm.js", "diaryx_wasm_bg.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]' package.json > tmp.json && mv tmp.json package.json

          # Tag pushes use the version as-is (stable release)
          # Branch pushes get a dev pre-release suffix
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          else
            jq --arg v "${BASE_VERSION}-dev.${SHORT_SHA}" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            echo "NPM_TAG=dev" >> $GITHUB_ENV
          fi

          echo "Publishing version: $(jq -r '.version' package.json) with tag: ${NPM_TAG:-pending}"
          cat package.json

      - name: Publish to npm
        working-directory: wasm-output
        run: npm publish --provenance --access public --tag ${{ env.NPM_TAG }}

  # Publish WASM Node.js bindings to npm (JS glue + types + .wasm binary)
  publish-wasm-node-npm:
    name: Publish WASM Node to npm
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM (Node.js, no browser features)
        run: wasm-pack build crates/diaryx_wasm --target web --no-default-features

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Patch package.json for npm
        working-directory: crates/diaryx_wasm/pkg
        run: |
          BASE_VERSION=$(jq -r '.version' package.json)
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Set scoped package name
          jq '.name = "@diaryx/wasm-node"' package.json > tmp.json && mv tmp.json package.json

          # Include .wasm binary (Node.js loads it from disk via readFileSync)
          jq '.files = ["diaryx_wasm_bg.wasm", "diaryx_wasm.js", "diaryx_wasm_bg.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]' package.json > tmp.json && mv tmp.json package.json

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          else
            jq --arg v "${BASE_VERSION}-dev.${SHORT_SHA}" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            echo "NPM_TAG=dev" >> $GITHUB_ENV
          fi

          echo "Publishing version: $(jq -r '.version' package.json) with tag: ${NPM_TAG:-pending}"
          cat package.json

      - name: Publish to npm
        working-directory: crates/diaryx_wasm/pkg
        run: npm publish --provenance --access public --tag ${{ env.NPM_TAG }}

  # Web app unit tests
  test-web:
    name: Test Web App
    needs: [changes, build-wasm]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: apps/web/src/lib/wasm/

      - name: Download bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: crates/diaryx_core/bindings/

      - name: Install dependencies
        run: |
          cd apps/web
          nix develop --command bun install

      - name: Run unit tests
        run: |
          cd apps/web
          nix develop --command bun run test -- --run

      - name: Run tests with coverage
        run: |
          cd apps/web
          nix develop --command bun run test:coverage -- --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/

  # Web app E2E tests with Playwright (local-only tests, no sync server)
  test-web-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [web, build-wasm, changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: apps/web/src/lib/wasm/

      - name: Download bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: ts-bindings
          path: crates/diaryx_core/bindings/

      - name: Install dependencies
        run: |
          cd apps/web
          nix develop --command bun install

      - name: Install Playwright browsers
        run: |
          cd apps/web
          nix develop --command bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd apps/web
          nix develop --command bunx playwright test --project=chromium \
            e2e/editor.spec.ts e2e/workspace.spec.ts e2e/attachments.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # Detect changes to tauri-related files
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      tauri: ${{ steps.filter.outputs.tauri }}
      web: ${{ steps.filter.outputs.web }}
      wasm: ${{ steps.filter.outputs.wasm }}
      plugins: ${{ steps.filter.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for tauri-related changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            tauri:
              - 'apps/tauri/**'
              - 'apps/web/**'
              - 'crates/diaryx_core/**'
            web:
              - 'apps/web/**'
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_wasm/**'
            wasm:
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_wasm/**'
            plugins:
              - 'crates/*_extism/**'
              - 'crates/diaryx_extism/**'
              - 'scripts/plugins/**'
              - 'plugins/catalog/**'
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # Tauri compilation check (cargo check, not full build)
  # Full builds are done in tauri-release.yml on tags
  tauri-check:
    name: Check Tauri Build
    runs-on: ubuntu-latest
    needs: [changes, web]
    if: needs.changes.outputs.tauri == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Check Tauri compiles
        run: cargo check -p diaryx_tauri

  # Deploy web app to Cloudflare on push to master (after tests pass)
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [web, test-web, test-web-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          packageManager: npm
          command: deploy

  # Minimum Supported Rust Version
  msrv:
    name: MSRV Check
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p diaryx
