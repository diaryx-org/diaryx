name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Change detection ─────────────────────────────────────────────────────

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      server: ${{ steps.filter.outputs.server }}
      tauri: ${{ steps.filter.outputs.tauri }}
      web: ${{ steps.filter.outputs.web }}
      wasm: ${{ steps.filter.outputs.wasm }}
      plugins: ${{ steps.filter.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            server:
              - 'crates/diaryx_server/**'
              - 'crates/diaryx_sync_server/**'
              - 'crates/diaryx_cloudflare/**'
            tauri:
              - 'apps/tauri/**'
              - 'apps/web/**'
              - 'crates/diaryx_core/**'
            web:
              - 'apps/web/**'
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_wasm/**'
            wasm:
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_wasm/**'
            plugins:
              - 'crates/plugins/**'
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_extism/**'

  # ── Rust lint & test (lightweight, no Nix) ───────────────────────────────

  fmt:
    name: Formatting
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p diaryx_core -- -D warnings

  test:
    name: Test Rust
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p diaryx_core -p diaryx --verbose
      - run: cargo test -p diaryx --verbose

  msrv:
    name: MSRV Check
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p diaryx

  # ── Server crates ───────────────────────────────────────────────────

  test-server:
    name: Test Server Crates
    needs: [changes]
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p diaryx_server -p diaryx_sync_server --verbose

  check-cloudflare:
    name: Check Cloudflare Worker
    needs: [changes]
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown
        working-directory: crates/diaryx_cloudflare

  # ── Plugins (SDK + guest WASM) ───────────────────────────────────────────

  check-plugins:
    name: Check Plugins
    needs: [changes]
    if: needs.changes.outputs.plugins == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p diaryx_plugin_sdk
      - run: cargo check -p diaryx_sync_extism --target wasm32-unknown-unknown
      - run: cargo check -p diaryx_publish_extism --target wasm32-unknown-unknown

  build-plugins:
    name: Build Plugin WASMs
    needs: [check-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown -p diaryx_sync_extism --release
      - run: cargo build --target wasm32-unknown-unknown -p diaryx_publish_extism --release
      - name: Upload plugin WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wasms
          path: |
            target/wasm32-unknown-unknown/release/diaryx_sync_extism.wasm
            target/wasm32-unknown-unknown/release/diaryx_publish_extism.wasm

  test-plugins:
    name: Test Plugins
    needs: [build-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Download plugin WASMs
        uses: actions/download-artifact@v4
        with:
          name: plugin-wasms
          path: target/wasm32-unknown-unknown/release/
      - run: cargo test -p diaryx_sync_extism --verbose

  # ── WASM & bindings ─────────────────────────────────────────────────────

  build-wasm:
    name: Build WASM & Bindings
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.117 --locked

      - name: Install binaryen
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_125/binaryen-version_125-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_125/bin" >> "$GITHUB_PATH"

      - name: Build WASM package
        run: |
          cargo build -p diaryx_wasm --target wasm32-unknown-unknown --release
          mkdir -p result-wasm
          wasm-bindgen --target web --out-dir result-wasm \
            target/wasm32-unknown-unknown/release/diaryx_wasm.wasm
          wasm-opt -Oz -o result-wasm/diaryx_wasm_bg.wasm result-wasm/diaryx_wasm_bg.wasm
          cat > result-wasm/package.json <<'EOF'
          {
            "name": "diaryx_wasm",
            "type": "module",
            "version": "1.4.0",
            "main": "diaryx_wasm.js",
            "types": "diaryx_wasm.d.ts",
            "files": ["diaryx_wasm_bg.wasm", "diaryx_wasm.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]
          }
          EOF

      - name: Generate TypeScript bindings
        run: cargo test -p diaryx_core

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: result-wasm/

      - name: Upload bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: crates/diaryx_core/bindings/

  # ── Web app (build + type-check + unit tests) ───────────────────────────

  web:
    name: Build & Test Web App
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-web

      - name: Type check
        run: cd apps/web && bun run check

      - name: Unit tests
        run: cd apps/web && bun run test -- --run

      - name: Build
        run: cd apps/web && bunx vite build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  # ── E2E tests ────────────────────────────────────────────────────────────

  test-web-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [web, build-wasm, changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-web

      - name: Install Playwright browsers
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd apps/web
          bunx playwright test --project=chromium \
            e2e/editor.spec.ts e2e/workspace.spec.ts e2e/attachments.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ── Tauri check ──────────────────────────────────────────────────────────

  tauri-check:
    name: Check Tauri Build
    runs-on: ubuntu-latest
    needs: [changes, web]
    if: needs.changes.outputs.tauri == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - run: cargo check -p diaryx_tauri --features desktop-updater

  # ── CDN upload ───────────────────────────────────────────────────────────

  upload-wasm-cdn:
    name: Upload Core WASM to CDN
    runs-on: ubuntu-latest
    needs: [build-wasm, changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: wasm-output/

      - name: Upload WASM to CDN (SHA)
        uses: ./.github/actions/upload-wasm-cdn
        with:
          wasm-path: wasm-output
          version: sha-${{ github.sha }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-endpoint: ${{ secrets.R2_ENDPOINT }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

      - name: Upload WASM to CDN (branch)
        uses: ./.github/actions/upload-wasm-cdn
        with:
          wasm-path: wasm-output
          version: ${{ github.ref_name }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-endpoint: ${{ secrets.R2_ENDPOINT }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

  # ── npm publish ──────────────────────────────────────────────────────────

  publish-wasm-npm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    needs: [build-wasm, changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: wasm-output/

      - name: Publish
        uses: ./.github/actions/publish-wasm-npm
        with:
          package-name: '@diaryx/wasm'
          working-directory: wasm-output
          files: '["diaryx_wasm.js", "diaryx_wasm_bg.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]'
          node-auth-token: ${{ secrets.NPM_TOKEN }}

  publish-wasm-node-npm:
    name: Publish WASM Node to npm
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM (Node.js, no browser features)
        run: wasm-pack build crates/diaryx_wasm --target web --no-default-features

      - name: Publish
        uses: ./.github/actions/publish-wasm-npm
        with:
          package-name: '@diaryx/wasm-node'
          working-directory: crates/diaryx_wasm/pkg
          files: '["diaryx_wasm_bg.wasm", "diaryx_wasm.js", "diaryx_wasm_bg.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]'
          node-auth-token: ${{ secrets.NPM_TOKEN }}

  # ── Deploy ───────────────────────────────────────────────────────────────

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [web]
    if: ${{ needs.web.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          packageManager: npm
          command: deploy

  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: [test-server, check-cloudflare]
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare
        working-directory: crates/diaryx_cloudflare
        run: wrangler deploy --no-bundle --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
