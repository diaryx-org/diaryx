name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Change detection ─────────────────────────────────────────────────────

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      server: ${{ steps.filter.outputs.server }}
      tauri: ${{ steps.filter.outputs.tauri }}
      web: ${{ steps.filter.outputs.web }}
      wasm: ${{ steps.filter.outputs.wasm }}
      plugins: ${{ steps.filter.outputs.plugins }}
      publish_plugin: ${{ steps.filter.outputs.publish_plugin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            server:
              - 'crates/diaryx_server/**'
              - 'crates/diaryx_sync_server/**'
              - 'crates/diaryx_cloudflare/**'
            tauri:
              - 'apps/tauri/**'
              - 'apps/web/**'
              - 'crates/diaryx_core/**'
            web:
              - 'apps/web/**'
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_wasm/**'
            wasm:
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_wasm/**'
            plugins:
              - 'crates/plugins/**'
              - 'crates/diaryx_core/**'
              - 'crates/diaryx_extism/**'
            publish_plugin:
              - 'crates/plugins/diaryx_publish_extism/**'
              - 'crates/plugins/diaryx_plugin_sdk/**'

  # ── Rust lint & test (lightweight, no Nix) ───────────────────────────────

  fmt:
    name: Formatting
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p diaryx_core -- -D warnings

  test:
    name: Test Rust
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p diaryx_core -p diaryx --verbose
      - run: cargo test -p diaryx --verbose

  msrv:
    name: MSRV Check
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p diaryx

  # ── Server crates ───────────────────────────────────────────────────

  test-server:
    name: Test Server Crates
    needs: [changes]
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p diaryx_server -p diaryx_sync_server --verbose

  check-cloudflare:
    name: Check Cloudflare Worker
    needs: [changes]
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown
        working-directory: crates/diaryx_cloudflare

  # ── Plugins (SDK + guest WASM) ───────────────────────────────────────────

  check-plugins:
    name: Check Plugins
    needs: [changes]
    if: needs.changes.outputs.plugins == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p diaryx_plugin_sdk
      - run: cargo check -p diaryx_publish_extism --target wasm32-unknown-unknown

  build-plugins:
    name: Build Plugin WASMs
    needs: [check-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown -p diaryx_publish_extism --release
      - name: Upload plugin WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-wasms
          path: |
            target/wasm32-unknown-unknown/release/diaryx_publish_extism.wasm

  # ── Publish plugin: dev channel ──────────────────────────────────────────
  # Auto-publishes a dev build of the publish plugin on every push to master
  # that touches its folder. The dev version is stamped into the crate so the
  # wasm manifest matches the dev registry entry; the artifact + a single-entry
  # registry-dev.md are uploaded straight to R2 (no registry-repo round-trip).

  publish-publish-plugin-dev:
    name: Publish Publish-Plugin Dev Build
    needs: [changes, build-plugins]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.changes.outputs.publish_plugin == 'true'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      CDN_BASE: https://app.diaryx.org/cdn
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute dev version
        id: ver
        run: |
          BASE=$(grep -m1 '^version' crates/plugins/diaryx_publish_extism/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          DEV_VERSION="${BASE}-dev.${{ github.run_number }}"
          echo "dev_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Dev version: $DEV_VERSION"

      - name: Stamp dev version into Cargo.toml (ephemeral)
        run: |
          sed -i -E "0,/^version = \".*\"/s//version = \"${{ steps.ver.outputs.dev_version }}\"/" \
            crates/plugins/diaryx_publish_extism/Cargo.toml

      - name: Build dev WASM
        run: cargo build --target wasm32-unknown-unknown -p diaryx_publish_extism --release

      - name: Upload artifact and assemble registry-dev.md
        env:
          DEV_VERSION: ${{ steps.ver.outputs.dev_version }}
        run: |
          set -euo pipefail
          pip install pyyaml

          WASM=target/wasm32-unknown-unknown/release/diaryx_publish_extism.wasm
          SHA=$(sha256sum "$WASM" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$WASM")
          S3_KEY="plugins/artifacts/diaryx.publish/${DEV_VERSION}/diaryx_publish_extism.wasm"

          aws s3 cp "$WASM" "s3://${R2_BUCKET}/${S3_KEY}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type application/wasm \
            --cache-control "public, max-age=31536000, immutable"

          SHA="$SHA" SIZE="$SIZE" S3_KEY="$S3_KEY" python3 - <<'PY'
          import os, sys, urllib.request, yaml
          from datetime import datetime, timezone

          cdn = os.environ["CDN_BASE"].rstrip("/")
          dev_version = os.environ["DEV_VERSION"]
          sha = os.environ["SHA"]
          size = int(os.environ["SIZE"])
          s3_key = os.environ["S3_KEY"]

          # Reuse the live stable entry's metadata; override only version + artifact.
          url = f"{cdn}/plugins/registry.md"
          req = urllib.request.Request(url, headers={"User-Agent": "diaryx-ci/1.0"})
          with urllib.request.urlopen(req, timeout=60) as resp:
              text = resp.read().decode("utf-8")
          meta = yaml.safe_load(text.split("---", 2)[1])

          entry = next((p for p in meta.get("plugins", []) if p.get("id") == "diaryx.publish"), None)
          if entry is None:
              sys.exit("diaryx.publish not found in stable registry")

          entry = dict(entry)
          entry["version"] = dev_version
          entry["artifact"] = {
              "url": f"{cdn}/{s3_key}",
              "sha256": sha,
              "size": size,
              "published_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }

          dev_meta = {
              "schema_version": 2,
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "cdn_base": cdn,
              "plugins": [entry],
          }
          out = (
              "---\n"
              + yaml.dump(dev_meta, sort_keys=False, allow_unicode=True)
              + "---\n\n# Diaryx Plugin Registry (dev)\n"
          )
          with open("registry-dev.md", "w", encoding="utf-8") as f:
              f.write(out)
          print(f"Wrote registry-dev.md for diaryx.publish {dev_version}")
          PY

          aws s3 cp registry-dev.md "s3://${R2_BUCKET}/plugins/registry-dev.md" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type text/markdown \
            --cache-control "public, max-age=300"

  # ── WASM & bindings ─────────────────────────────────────────────────────

  build-wasm:
    name: Build WASM & Bindings
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli@0.2.122 --locked

      - name: Install binaryen
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_125/binaryen-version_125-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_125/bin" >> "$GITHUB_PATH"

      - name: Build WASM package
        run: |
          cargo build -p diaryx_wasm --target wasm32-unknown-unknown --release
          mkdir -p result-wasm
          wasm-bindgen --target web --out-dir result-wasm \
            target/wasm32-unknown-unknown/release/diaryx_wasm.wasm
          wasm-opt -Oz -o result-wasm/diaryx_wasm_bg.wasm result-wasm/diaryx_wasm_bg.wasm
          WASM_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "diaryx_wasm") | .version')
          jq -n --arg version "$WASM_VERSION" '{
            name: "diaryx_wasm",
            type: "module",
            version: $version,
            main: "diaryx_wasm.js",
            types: "diaryx_wasm.d.ts",
            files: ["diaryx_wasm_bg.wasm", "diaryx_wasm.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]
          }' > result-wasm/package.json

      - name: Generate TypeScript bindings
        run: cargo test -p diaryx_core --features typescript

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: result-wasm/

      - name: Upload bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-bindings
          path: crates/diaryx_core/bindings/

  # ── Web app (build + type-check + unit tests) ───────────────────────────

  web:
    name: Build & Test Web App
    runs-on: ubuntu-latest
    needs: [changes, build-wasm]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-web

      - name: Type check
        run: cd apps/web && bun run check

      - name: Unit tests
        run: cd apps/web && bun run test -- --run

      - name: Build
        run: cd apps/web && bunx vite build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  # ── E2E tests ────────────────────────────────────────────────────────────

  test-web-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [web, build-wasm, changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-web

      - name: Install Playwright browsers
        run: cd apps/web && bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd apps/web
          bunx playwright test --project=chromium \
            e2e/editor.spec.ts e2e/workspace.spec.ts e2e/attachments.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ── Tauri check ──────────────────────────────────────────────────────────

  tauri-check:
    name: Check Tauri Build
    runs-on: ubuntu-latest
    needs: [changes, web]
    if: needs.changes.outputs.tauri == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - run: cargo check -p diaryx_tauri --features desktop-updater

  # ── CDN upload ───────────────────────────────────────────────────────────

  upload-wasm-cdn:
    name: Upload Core WASM to CDN
    runs-on: ubuntu-latest
    needs: [build-wasm, changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: wasm-output/

      - name: Upload WASM to CDN (SHA)
        uses: ./.github/actions/upload-wasm-cdn
        with:
          wasm-path: wasm-output
          version: sha-${{ github.sha }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-endpoint: ${{ secrets.R2_ENDPOINT }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

      - name: Upload WASM to CDN (branch)
        uses: ./.github/actions/upload-wasm-cdn
        with:
          wasm-path: wasm-output
          version: ${{ github.ref_name }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-endpoint: ${{ secrets.R2_ENDPOINT }}
          r2-bucket: ${{ secrets.R2_BUCKET }}

  # ── npm publish ──────────────────────────────────────────────────────────

  publish-wasm-npm:
    name: Publish WASM to npm
    runs-on: ubuntu-latest
    needs: [build-wasm, changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-package
          path: wasm-output/

      - name: Publish
        uses: ./.github/actions/publish-wasm-npm
        with:
          package-name: '@diaryx/wasm'
          working-directory: wasm-output
          files: '["diaryx_wasm.js", "diaryx_wasm_bg.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]'
          node-auth-token: ${{ secrets.NPM_TOKEN }}

  publish-wasm-node-npm:
    name: Publish WASM Node to npm
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.wasm == 'true')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM (Node.js, no browser features)
        run: wasm-pack build crates/diaryx_wasm --target web --no-default-features

      - name: Publish
        uses: ./.github/actions/publish-wasm-npm
        with:
          package-name: '@diaryx/wasm-node'
          working-directory: crates/diaryx_wasm/pkg
          files: '["diaryx_wasm_bg.wasm", "diaryx_wasm.js", "diaryx_wasm_bg.js", "diaryx_wasm.d.ts", "diaryx_wasm_bg.wasm.d.ts"]'
          node-auth-token: ${{ secrets.NPM_TOKEN }}

  # ── Deploy ───────────────────────────────────────────────────────────────

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [web]
    if: ${{ needs.web.result == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          packageManager: npm
          command: deploy

  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: [test-server, check-cloudflare]
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/setup-zig
      - uses: Swatinem/rust-cache@v2

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare
        working-directory: crates/diaryx_cloudflare
        run: |
          wrangler d1 migrations apply diaryx-users --remote --env production
          wrangler deploy --no-bundle --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
