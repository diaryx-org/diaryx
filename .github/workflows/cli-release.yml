name: CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
      dry_run:
        description: "Dry run: skip crates.io publish and create the GitHub release as a draft"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: diaryx

jobs:
  # Build binaries for cargo-binstall
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zigbuild
        if: matrix.zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build binary (native)
        if: '!matrix.zigbuild'
        run: cargo build --release -p diaryx --target ${{ matrix.target }}

      - name: Build binary (zigbuild)
        if: matrix.zigbuild
        run: cargo zigbuild --release -p diaryx --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} dist/
          # Copy README and LICENSE if they exist
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE.md ] && cp LICENSE.md dist/ || true
          cd dist
          tar -czvf ../${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -Destination dist/
          if (Test-Path README.md) { Copy-Item README.md -Destination dist/ }
          if (Test-Path LICENSE.md) { Copy-Item LICENSE.md -Destination dist/ }
          Compress-Archive -Path dist/* -DestinationPath "${{ env.BINARY_NAME }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}

  # Create GitHub Release with binaries
  release:
    name: Create Release
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Diaryx ${{ steps.tag.outputs.tag }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          body: |
            ## Installation

            ### Via Homebrew (macOS & Linux)
            ```bash
            brew tap diaryx-org/tap
            brew install diaryx
            ```

            ### Via cargo-binstall (pre-compiled binary)
            ```bash
            cargo binstall --git https://github.com/diaryx-org/diaryx diaryx
            ```

            ### Manual Download
            Download the appropriate binary for your platform from the assets below.
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Homebrew tap
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        uses: actions/checkout@v4
        with:
          repository: diaryx-org/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew Formula
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: |
          VERSION=$(echo "${{ steps.tag.outputs.tag }}" | sed 's/^v//')
          SHA_INTEL=$(sha256sum release/diaryx-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_ARM=$(sha256sum release/diaryx-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)

          mkdir -p homebrew-tap/Formula
          cat <<EOF > homebrew-tap/Formula/diaryx.rb
          class Diaryx < Formula
            desc "Local-first journal with audience visibility control"
            homepage "https://diaryx.org/"
            version "${VERSION}"

            if Hardware::CPU.intel?
              url "https://github.com/diaryx-org/diaryx/releases/download/v#{version}/diaryx-x86_64-apple-darwin.tar.gz"
              sha256 "${SHA_INTEL}"
            else
              url "https://github.com/diaryx-org/diaryx/releases/download/v#{version}/diaryx-aarch64-apple-darwin.tar.gz"
              sha256 "${SHA_ARM}"
            end

            def install
              bin.install "diaryx"
            end

            test do
              system "#{bin}/diaryx", "--version"
            end
          end
          EOF

      - name: Commit and Push to Homebrew tap
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/diaryx.rb
          git commit -m "Update diaryx CLI to ${{ steps.tag.outputs.tag }}" || exit 0
          git push origin main
