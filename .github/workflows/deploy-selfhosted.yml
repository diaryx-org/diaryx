name: Deploy Self-Hosted Backend

# Disabled: the managed backend now deploys to Cloudflare via CI.
# Kept as a reference for self-hosting on a VPS.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true

jobs:
  build:
    name: Build Self-Hosted Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build release binary
        run: nix build .#diaryx-selfhosted

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-binary
          path: result/bin/diaryx_selfhosted

  deploy:
    name: Deploy to VPS
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: selfhosted-binary
          path: artifact/

      - name: Copy binary, deploy script, and config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: artifact/diaryx_selfhosted,deploy/deploy-selfhosted.sh,deploy/Caddyfile,deploy/diaryx-selfhosted.service
          target: /tmp/diaryx-deploy
          strip_components: 1

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: bash /tmp/diaryx-deploy/deploy-selfhosted.sh
