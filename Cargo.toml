[workspace]
resolver = "2"
members = [
    "crates/diaryx_core",
    "crates/diaryx",
    "crates/diaryx_apple",
    "crates/diaryx_wasm",
    "crates/diaryx_daily",
    "crates/diaryx_templating",
    "crates/diaryx_sync",
    "crates/diaryx_publish",
    "crates/diaryx_sync_server",
    "crates/diaryx_extism",
    "crates/diaryx_daily_extism",
    "crates/diaryx_templating_extism",
    "crates/diaryx_sync_extism",
    "crates/diaryx_ai_extism",
    "crates/diaryx_publish_extism",
    "crates/diaryx_math_extism",
    "crates/diaryx_spoiler_extism",
    "crates/diaryx_storage_s3_extism",
    "crates/diaryx_storage_gdrive_extism",
    "apps/tauri/src-tauri"
]

[workspace.package]
version = "1.2.1"
edition = "2024"
rust-version = "1.91"
repository = "https://github.com/diaryx-org/diaryx"
homepage = "https://github.com/diaryx-org/diaryx"
readme = "README.md"
# PolyForm Shield is not an SPDX identifier, so we use license-file
license-file = "LICENSE.md"

[workspace.dependencies]
# Shared dependencies across workspace
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "2.0"
chrono = { version = "0.4", default-features = false, features = ["serde", "std", "clock"] }
indexmap = { version = "2.0", features = ["serde"] }

# Internal crates - version must match workspace.package.version for publishing
diaryx_core = { path = "crates/diaryx_core", version = "1.2.1" }
diaryx_apple = { path = "crates/diaryx_apple", version = "0.14.1" }
diaryx_daily = { path = "crates/diaryx_daily", version = "1.2.1" }
diaryx_templating = { path = "crates/diaryx_templating", version = "1.2.1" }
diaryx_publish = { path = "crates/diaryx_publish", version = "1.2.1" }
diaryx_sync = { path = "crates/diaryx_sync", version = "1.2.1" }
diaryx_extism = { path = "crates/diaryx_extism" }

# cargo-release configuration
[workspace.metadata.release]
# Shared release configuration
shared-version = true
tag-name = "v{{version}}"
tag-message = "Release v{{version}}"
pre-release-commit-message = "chore: release v{{version}}"
publish = true
push = true

[profile.release.package.diaryx_wasm]
# Keep wasm artifact size small without using per-crate profile stanzas.
opt-level = "s"

# Patch getrandom 0.2 to let `custom` feature take priority over `js` on wasm32.
# Upstream getrandom checks `js` first, so when both features are enabled (our
# `custom` + yrs→fastrand→getrandom/js), the JS/wasm-bindgen backend is selected
# instead of our custom backend. This patch swaps the priority so diaryx_sync_extism
# (which needs custom RNG, no wasm-bindgen) works correctly, while diaryx_wasm
# (which only has `js`, not `custom`) still uses the browser crypto backend.
[patch.crates-io]
getrandom = { path = "patches/getrandom-0.2" }
