<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audience Filtering Demo</title>
    <style>
      :root {
        --background: 0 0% 99%;
        --foreground: 0 0% 12%;
        --card: 0 0% 100%;
        --card-foreground: 0 0% 12%;
        --primary: 145 44% 45%;
        --primary-foreground: 0 0% 100%;
        --secondary: 0 0% 95%;
        --secondary-foreground: 0 0% 25%;
        --muted: 0 0% 94%;
        --muted-foreground: 0 0% 40%;
        --accent: 145 44% 45%;
        --accent-foreground: 0 0% 100%;
        --border: 0 0% 88%;
        --radius: 12px;
        --editor-font-family: system-ui, -apple-system, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([style*="--background"]) {
          --background: 0 0% 10%;
          --foreground: 0 0% 92%;
          --card: 0 0% 13%;
          --card-foreground: 0 0% 92%;
          --primary: 152 49% 48%;
          --primary-foreground: 0 0% 10%;
          --secondary: 0 0% 17%;
          --secondary-foreground: 0 0% 82%;
          --muted: 0 0% 16%;
          --muted-foreground: 0 0% 60%;
          --accent: 152 49% 48%;
          --accent-foreground: 0 0% 10%;
          --border: 0 0% 22%;
        }
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--editor-font-family);
        font-size: 12px;
        line-height: 1.4;
        color: hsl(var(--foreground));
        background: hsl(var(--background));
        padding: 10px 14px;
        overflow: hidden;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 10px;
      }

      .filters button {
        appearance: none;
        padding: 3px 11px;
        border-radius: 100px;
        border: 1.5px solid hsl(var(--border));
        background: hsl(var(--card));
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        color: hsl(var(--muted-foreground));
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .filters button:hover {
        border-color: hsl(var(--muted-foreground));
        color: hsl(var(--foreground));
      }

      .filters button.active {
        background: hsl(var(--foreground));
        color: hsl(var(--background));
        border-color: hsl(var(--foreground));
      }

      .journal {
        display: flex;
        flex-direction: column;
        gap: 1px;
        background: hsl(var(--border));
        border-radius: 6px;
        overflow: hidden;
      }

      .entry {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 7px 12px;
        background: hsl(var(--card));
        transition: opacity 0.3s ease, max-height 0.35s ease, padding 0.35s ease;
        max-height: 50px;
        overflow: hidden;
      }

      .entry.hidden {
        opacity: 0;
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
      }

      .entry-title {
        font-size: 12px;
        font-weight: 600;
        color: hsl(var(--card-foreground));
      }

      .entry-snippet {
        font-size: 11px;
        color: hsl(var(--muted-foreground));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 420px;
      }

      .tag {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 100px;
        font-size: 10px;
        font-weight: 600;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .tag-public {
        background: hsl(var(--accent) / 0.12);
        color: hsl(var(--accent));
      }

      .tag-developers {
        background: hsl(var(--primary) / 0.12);
        color: hsl(var(--primary));
      }

      .tag-agents {
        background: hsl(var(--muted-foreground) / 0.15);
        color: hsl(var(--muted-foreground));
      }

      .annotation {
        margin-top: 8px;
        padding: 6px 10px;
        background: hsl(var(--card));
        border-radius: 6px;
        border: 1.5px solid hsl(var(--border));
        font-size: 11px;
        color: hsl(var(--muted-foreground));
        line-height: 1.45;
        transition: opacity 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div class="filters" id="filters"></div>
    <div class="journal" id="journal"></div>
    <div class="annotation" id="annotation"></div>

    <script>
      const filters = [
        { id: "all", label: "Everything" },
        { id: "public", label: "Public" },
        { id: "developers", label: "Developers" },
        { id: "agents", label: "Agents" },
      ];

      const entries = [
        { title: "Homepage launch", snippet: "A clearer homepage that explains audience filtering\u2026",
          audience: "public", visibleTo: ["public", "developers", "agents"] },
        { title: "Why this matters", snippet: "Each extra layer stays hidden until the audience needs it\u2026",
          audience: "public", visibleTo: ["public", "developers", "agents"] },
        { title: "Implementation detail", snippet: "Editor preserves HTML attachment MIME types for inline rendering\u2026",
          audience: "developers", visibleTo: ["developers", "agents"] },
        { title: "Theme handoff", snippet: "Attachment iframes listen for host theme updates via CSS variables\u2026",
          audience: "developers", visibleTo: ["developers", "agents"] },
        { title: "Agent instruction", snippet: "Read relevant docs before changes, update docs afterward\u2026",
          audience: "agents", visibleTo: ["agents"] },
      ];

      const annotations = {
        all: "Five blocks, three audiences. Each written with a different reader in mind.",
        public: "Everyone sees the high-level story. Implementation details and agent instructions stay hidden.",
        developers: "Developers see the public content plus implementation details. Agent-only instructions stay hidden.",
        agents: "Agents see everything \u2014 public content, developer details, and their own instructions.",
      };

      let current = "all";

      function render() {
        document.getElementById("filters").innerHTML = filters.map(f =>
          `<button data-filter="${f.id}" class="${f.id === current ? 'active' : ''}">${f.label}</button>`
        ).join("");

        document.getElementById("journal").innerHTML = entries.map(e => {
          const visible = current === "all" || e.visibleTo.includes(current);
          return `<div class="entry${visible ? '' : ' hidden'}">
            <div style="min-width:0">
              <div class="entry-title">${e.title}</div>
              <div class="entry-snippet">${e.snippet}</div>
            </div>
            <span class="tag tag-${e.audience}">${e.audience}</span>
          </div>`;
        }).join("");

        const ann = document.getElementById("annotation");
        ann.style.opacity = "0";
        setTimeout(() => {
          ann.textContent = annotations[current];
          ann.style.opacity = "1";
        }, 180);

        for (const btn of document.querySelectorAll(".filters button"))
          btn.addEventListener("click", () => { current = btn.dataset.filter; render(); });
      }

      render();
    </script>
  </body>
</html>
