[package]
name = "diaryx_tauri"
version.workspace = true
edition.workspace = true
license-file.workspace = true
description = "Tauri application for Diaryx journal management (desktop and mobile)"
publish = false

[lib]
name = "diaryx_tauri_lib"
crate-type = ["staticlib", "cdylib", "lib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
diaryx_core = { workspace = true }
diaryx_native = { workspace = true }
serde.workspace = true
serde_json.workspace = true
serde_yaml = "0.9"
thiserror.workspace = true
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-shell = "2"
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
log = "0.4"
env_logger = "0.11"
base64 = "0.22"
chrono = "0.4"
pathdiff = "0.2"

tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
uuid = { version = "1", features = ["v4"] }

# Apple IAP (StoreKit 2) — optional, only for App Store builds
tauri-plugin-iap = { path = "../../../crates/tauri-plugin-iap", optional = true }

# Apple iCloud Drive workspace storage — optional, only for iOS builds
tauri-plugin-icloud = { path = "../../../crates/tauri-plugin-icloud", optional = true }

# Native iOS keyboard toolbar for TipTap editor
tauri-plugin-editor-toolbar = { path = "../../../crates/tauri-plugin-editor-toolbar" }
reqwest = { version = "0.12", features = ["json", "multipart"] }
ureq = "3"
async-trait = "0.1"
url = "2"
percent-encoding = "2"
dotenvy = "0.15"

# Dev-only HTTP IPC listener for driving the app from outside the webview
# (see src/dev_ipc.rs). All three crates are gated behind the `dev-ipc`
# feature — off by default so release builds (and Linux CI) don't pay the
# cost. On Linux `xcap` transitively requires the `libpipewire-0.3-dev`
# system headers.
tiny_http = { version = "0.12", optional = true }
xcap = { version = "0.6", optional = true }
image = { version = "0.25", default-features = false, features = ["png"], optional = true }

# Optional: Extism third-party plugin runtime
diaryx_extism = { path = "../../../crates/diaryx_extism", optional = true }
dirs = { version = "6.0", optional = true }
futures-lite = { version = "2", optional = true }

# Secure credential storage via OS keychain (macOS Keychain, Windows Credential
# Manager, Linux secret-service, iOS Keychain). On Android, falls back to an
# encrypted file in the app's private data directory.
[target.'cfg(not(target_os = "android"))'.dependencies]
keyring = { version = "3", features = ["apple-native", "sync-secret-service"] }

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-updater = { version = "2", optional = true }

[features]
default = ["custom-protocol", "extism-plugins"]
custom-protocol = ["tauri/custom-protocol"]
desktop-updater = ["dep:tauri-plugin-updater"]
iap = ["dep:tauri-plugin-iap"]
icloud = ["dep:tauri-plugin-icloud"]
apple = ["iap", "icloud", "diaryx_extism/pulley"]
extism-plugins = ["dep:diaryx_extism", "dep:dirs", "dep:futures-lite", "diaryx_extism/wasi-runner", "diaryx_extism/http", "diaryx_extism/ws-transport"]
# Compile in the dev HTTP IPC listener (src/dev_ipc.rs). Off by default;
# intended for local development and integration testing only. The `/eval`
# endpoint additionally requires `DIARYX_DEV_IPC_EVAL=1` at runtime.
dev-ipc = ["dep:tiny_http", "dep:xcap", "dep:image"]

[dev-dependencies]
tempfile = "3"
futures-lite = "2"
