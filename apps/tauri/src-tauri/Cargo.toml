[package]
name = "diaryx_tauri"
version.workspace = true
edition.workspace = true
license-file.workspace = true
description = "Tauri application for Diaryx journal management (desktop and mobile)"
publish = false

[lib]
name = "diaryx_tauri_lib"
crate-type = ["staticlib", "cdylib", "lib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
diaryx_core = { workspace = true, features = ["markdown", "live-sync", "native-pandoc"] }
serde.workspace = true
serde_json.workspace = true
serde_yaml = "0.9"
thiserror.workspace = true
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
log = "0.4"
env_logger = "0.11"
base64 = "0.22"
chrono = "0.4"
pathdiff = "0.2"

tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
uuid = { version = "1", features = ["v4"] }

# Apple IAP (StoreKit 2) — optional, only for App Store builds
tauri-plugin-iap = { path = "../../../crates/tauri-plugin-iap", optional = true }

# Native iOS keyboard toolbar for TipTap editor
tauri-plugin-editor-toolbar = { path = "../../../crates/tauri-plugin-editor-toolbar" }
reqwest = { version = "0.12", features = ["json", "multipart"] }
url = "2"
dotenvy = "0.15"

# Optional: Extism third-party plugin runtime
diaryx_extism = { path = "../../../crates/diaryx_extism", optional = true }
dirs = { version = "6.0", optional = true }
futures-lite = { version = "2", optional = true }

[features]
default = ["custom-protocol", "extism-plugins"]
custom-protocol = ["tauri/custom-protocol"]
iap = ["dep:tauri-plugin-iap"]
extism-plugins = ["dep:diaryx_extism", "dep:dirs", "dep:futures-lite", "diaryx_extism/wasi-runner", "diaryx_extism/http", "diaryx_extism/ws-transport"]

[dev-dependencies]
