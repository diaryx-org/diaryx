[package]
name = "diaryx_core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
license-file.workspace = true
description = "Core library for Diaryx - a tool to manage markdown files with YAML frontmatter"
keywords = ["diary", "journal", "markdown", "frontmatter"]
categories = ["text-processing"]

[dependencies]
base64 = "0.22"
chrono.workspace = true
indexmap.workspace = true
log = "0.4"
pathdiff = "0.2"
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
thiserror.workspace = true
async-trait = "0.1"
urlencoding = "2"
uuid = { version = "1", features = ["v4", "rng-getrandom"] }

# Optional dependencies
comrak = { version = "0.49", optional = true }
toml = { version = "0.9.8", optional = true }
ts-rs = { version = "10", features = ["serde-json-impl", "indexmap-impl", "no-serde-warnings"], optional = true }
git2 = { version = "0.19", optional = true, default-features = false }

# Day One ZIP import (works on all platforms including WASM)
zip = { version = "2", default-features = false, features = ["deflate"], optional = true }

# Email import (native only, not available in WASM)
mailparse = { version = "0.16", optional = true }
mbox-reader = { version = "0.2", optional = true }

# Native-only dependencies (not available in WASM)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dirs = "6.0"
glob = "0.3"
futures-lite = "2"
rusqlite = { version = "0.34", features = ["bundled"], optional = true }
html-to-markdown-rs = { version = "2", optional = true }

# WASM-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
# Add wasm-bindgen when we need JS interop
# wasm-bindgen = "0.2"

[features]
# Publishing pipeline (publisher, content provider, format traits)
publish = []

# HTML publishing format (comrak-backed markdown-to-HTML conversion)
html-publish = ["publish", "dep:comrak"]

# Kept for backward compatibility.
markdown = []

# Placeholder feature for workspace crates that currently enable it.
live-sync = []

# TOML config file support (native CLI/Tauri only, not needed in WASM)
toml-config = ["dep:toml"]

# TypeScript binding generation (build-time only, not needed in WASM)
typescript = ["dep:ts-rs"]

# SQLite database support (enables Database error variant with rusqlite From impl)
database = ["dep:rusqlite"]

# Enable native pandoc binary invocation for multi-format export (CLI/Tauri only)
native-pandoc = []

# Enable email import (.eml and .mbox files)
import-email = ["dep:mailparse", "dep:mbox-reader", "dep:html-to-markdown-rs"]

# Enable Day One journal import (ZIP with media or Journal.json)
import-dayone = ["dep:zip"]

# Enable markdown directory import (folders of .md files)
import-markdown = []


# Browser WASM support (uuid/js for browser crypto)
browser-js = ["uuid/js"]

# Default features — enabled for native builds (CLI, Tauri, Apple, Extism guests).
# diaryx_wasm uses default-features = false to exclude these from the WASM binary.
default = ["toml-config", "typescript"]

[package.metadata.release]
# This crate should be published to crates.io
publish = true

[dev-dependencies]
tempfile = "3"
async-trait = "0.1"
