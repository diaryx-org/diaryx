[package]
name = "diaryx_core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
license-file.workspace = true
description = "Core library for Diaryx - a tool to manage markdown files with YAML frontmatter"
keywords = ["diary", "journal", "markdown", "frontmatter"]
categories = ["text-processing"]

[dependencies]
base64 = "0.22"
chrono.workspace = true
chrono-english = "0.1"
indexmap.workspace = true
log = "0.4"
pathdiff = "0.2"
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml = "0.9.8"
thiserror.workspace = true
async-trait = "0.1"
urlencoding = "2"
uuid = { version = "1", features = ["v4"] }


# TypeScript bindings generation
ts-rs = { version = "10", features = ["serde-json-impl", "indexmap-impl", "no-serde-warnings"] }

# Used by non-WASM sync wrappers (block_on) during the async-first refactor.
# On WASM, the sync wrappers are cfg-gated off.
futures-lite = "2"

# Optional dependencies
git2 = { version = "0.19", optional = true, default-features = false }
handlebars = { version = "6", optional = true }

# Day One ZIP import (works on all platforms including WASM)
zip = { version = "2", default-features = false, features = ["deflate"], optional = true }

# Email import (native only, not available in WASM)
mailparse = { version = "0.16", optional = true }
mbox-reader = { version = "0.2", optional = true }

# Native-only dependencies (not available in WASM)
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dirs = "6.0"
glob = "0.3"
rusqlite = { version = "0.34", features = ["bundled"], optional = true }
html-to-markdown-rs = { version = "2", optional = true }

# WASM-specific dependencies
[target.'cfg(target_arch = "wasm32")'.dependencies]
# Add wasm-bindgen when we need JS interop
# wasm-bindgen = "0.2"

[features]
# Kept for backward compatibility — the publish pipeline has moved to diaryx_publish.
markdown = []

# Placeholder feature for workspace crates that currently enable it.
live-sync = []

# SQLite database support (enables Database error variant with rusqlite From impl)
database = ["dep:rusqlite"]

# Enable native pandoc binary invocation for multi-format export (CLI/Tauri only)
native-pandoc = []

# Enable email import (.eml and .mbox files)
import-email = ["dep:mailparse", "dep:mbox-reader", "dep:html-to-markdown-rs"]

# Enable Day One journal import (ZIP with media or Journal.json)
import-dayone = ["dep:zip"]

# Enable markdown directory import (folders of .md files)
import-markdown = []

# Enable render-time body templating via Handlebars
templating = ["dep:handlebars"]

# Default features for the library
default = []

[package.metadata.release]
# This crate should be published to crates.io
publish = true

[dev-dependencies]
tempfile = "3"
diaryx_sync = { path = "../diaryx_sync" }
async-trait = "0.1"
