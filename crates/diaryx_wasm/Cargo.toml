[package]
name = "diaryx_wasm"
version.workspace = true
edition.workspace = true
repository.workspace = true
description = "WebAssembly bindings for Diaryx core functionality"
license-file.workspace = true
publish = false

[lib]
crate-type = ["cdylib", "rlib"]
doctest = false

[features]
# Production default: browser storage backends only. Panic hooks add significant
# WASM size (~5-10 KB of panic-formatting infrastructure), so they are opt-in.
# Enable `panic-hook` in dev/debug builds for better panic messages in the console.
default = ["browser"]
# Enable browser-specific storage backends (OPFS, IndexedDB, File System Access)
browser = ["dep:opfs", "dep:indexed-db", "dep:web-sys"]
# Enable console_error_panic_hook for readable panics in the browser console.
# Off by default for release builds to keep WASM size down.
panic-hook = ["dep:console_error_panic_hook"]

[dependencies]
diaryx_core = { path = "../diaryx_core", default-features = false, features = ["browser-js", "typescript"] }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "wasmbind"] }
pathdiff = "0.2"
log = "0.4"
async-trait = "0.1"
console_log = { version = "1.0", features = ["color"] }

# Browser-only storage backends (gated behind "browser" feature)
opfs = { version = "0.1.4", optional = true }
indexed-db = { version = "0.4.2", optional = true }
futures = "0.3"

# Web APIs for browser storage backends (gated behind "browser" feature)
web-sys = { version = "0.3", optional = true, features = [
  "DomException",
  "Navigator",
  "StorageManager",
  "WorkerGlobalScope",
  "WorkerNavigator",
  "FileSystemDirectoryHandle",
] }

# The `console_error_panic_hook` crate provides better debugging of panics by
# logging them with `console.error`. This is great for development, but requires
# all the `std::fmt` and `std::panicking` infrastructure, so isn't great for
# code size when deploying.
console_error_panic_hook = { version = "0.1", optional = true }

[dev-dependencies]
wasm-bindgen-test = "0.3"
