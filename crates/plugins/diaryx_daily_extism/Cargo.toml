[package]
name = "diaryx_daily_extism"
version = "0.1.7"
edition = "2024"
rust-version = "1.91"
license-file = "LICENSE.md"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
diaryx_core = { path = "../../diaryx_core" }
extism-pdk = "1.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
chrono = { version = "0.4", default-features = false, features = ["serde", "std"] }
chrono-english = "0.1"
indexmap = { version = "2", features = ["serde"] }
diaryx_plugin_sdk = { path = "../diaryx_plugin_sdk", features = ["core"] }
base64 = "0.22"
pathdiff = "0.2"
thiserror = "2"
