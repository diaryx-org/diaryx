[package]
name = "diaryx_github_extism"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
license = "MIT"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
diaryx_plugin_sdk = { workspace = true, features = ["core", "http", "secrets", "context"] }
extism-pdk = "1.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
