[package]
name = "diaryx_import_extism"
version = "0.1.4"
edition = "2024"
rust-version = "1.91"
license-file = "LICENSE.md"
publish = false

[lib]
crate-type = ["cdylib"]

[features]
default = ["markdown-import"]
markdown-import = []

[dependencies]
diaryx_core = { path = "../../diaryx_core", features = ["import-dayone"] }
diaryx_plugin_sdk = { workspace = true, features = ["core", "files"] }
extism-pdk = "1.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
indexmap = { version = "2", features = ["serde"] }
base64 = "0.22"

[profile.release]
lto = "fat"
codegen-units = 1
