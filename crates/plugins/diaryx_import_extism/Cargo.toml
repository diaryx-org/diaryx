[package]
name = "diaryx_import_extism"
version = "0.1.4"
edition = "2024"
rust-version = "1.91"
license-file = "LICENSE.md"
publish = false

[lib]
crate-type = ["cdylib"]

[features]
default = ["markdown-import", "email-import"]
markdown-import = []
email-import = ["dep:mailparse"]

[dependencies]
diaryx_core = { workspace = true }
diaryx_plugin_sdk = { workspace = true, features = ["core", "files"] }
extism-pdk = "1.4"
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
indexmap.workspace = true
base64 = "0.22"
chrono.workspace = true
zip = { version = "2", default-features = false, features = ["deflate"] }
mailparse = { version = "0.16", optional = true }
