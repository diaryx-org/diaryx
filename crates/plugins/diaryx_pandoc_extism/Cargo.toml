[package]
name = "diaryx_pandoc_extism"
version = "0.1.2"
edition = "2024"
rust-version = "1.91"
license-file = "LICENSE.md"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
diaryx_core = { workspace = true }
diaryx_plugin_sdk = { workspace = true, features = ["core", "http", "plugins", "wasi", "events", "getrandom-shim"] }
pathdiff = "0.2"
extism-pdk = "1.4"
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
indexmap.workspace = true
base64 = "0.22"
log = "0.4"
getrandom = { version = "0.2", features = ["custom"] }

[dev-dependencies]
futures-lite = "2"
