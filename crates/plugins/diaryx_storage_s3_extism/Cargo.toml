[package]
name = "diaryx_storage_s3_extism"
version = "0.1.4"
edition = "2024"
rust-version = "1.91"
license-file = "LICENSE.md"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
extism-pdk = "1.4"
serde.workspace = true
serde_json.workspace = true
base64 = "0.22"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
diaryx_plugin_sdk = { workspace = true, features = ["core", "http", "secrets"] }
