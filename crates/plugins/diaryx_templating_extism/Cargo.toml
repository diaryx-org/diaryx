[package]
name = "diaryx_templating_extism"
version = "0.1.6"
edition = "2024"
rust-version = "1.91"
license-file = "LICENSE.md"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
diaryx_core = { workspace = true, default-features = false }
diaryx_plugin_sdk = { workspace = true }
extism-pdk = "1.4"
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
chrono = { version = "0.4", default-features = false, features = ["serde", "std"] }
indexmap.workspace = true
base64 = "0.22"
handlebars = "6"
