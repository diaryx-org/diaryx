[package]
name = "tauri-plugin-editor-toolbar"
version = "0.1.0"
edition = "2021"
description = "Native iOS keyboard toolbar for the TipTap editor"
license = "MIT"
links = "tauri-plugin-editor-toolbar"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[dependencies]
tauri = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
