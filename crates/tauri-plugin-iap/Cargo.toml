[package]
name = "tauri-plugin-iap"
version = "0.1.0"
edition = "2021"
description = "Local Tauri plugin for Apple In-App Purchases via StoreKit 2"
license = "MIT"
links = "tauri-plugin-iap"
publish = false

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[dependencies]
tauri = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
