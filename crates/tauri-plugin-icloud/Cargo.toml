[package]
name = "tauri-plugin-icloud"
version = "0.1.0"
edition = "2021"
description = "Local Tauri plugin for iCloud Drive workspace storage"
license = "MIT"
links = "tauri-plugin-icloud"

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[dependencies]
tauri = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
